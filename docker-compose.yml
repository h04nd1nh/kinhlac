services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - APP_PORT=3001
      - FRONTEND_URL=http://103.57.221.26:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NUXT_PUBLIC_API_BASE=http://103.57.221.26:3001
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://103.57.221.26:3001
    depends_on:
      - backend
    restart: unless-stopped
