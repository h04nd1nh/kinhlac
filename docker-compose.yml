version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicine_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Môi trường database, bạn cần điều chỉnh theo thực tế
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=medicine
    depends_on:
      - postgres
    networks:
      - medicine_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicine_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - medicine_network

  postgres:
    image: postgres:15-alpine
    container_name: medicine_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medicine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medicine_network

networks:
  medicine_network:
    driver: bridge

volumes:
  postgres_data:
